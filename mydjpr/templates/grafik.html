<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логистика - Расчет наценки</title>
    {% load static %}
    <link rel="shortcut icon" type="image/ico" href="{% static 'favicon1.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a73e8;
            --secondary-color: #4285f4;
            --accent-color: #34a853;
            --dark-color: #202124;
            --light-color: #f8f9fa;
            --border-color: #dadce0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f7fa;
            color: var(--dark-color);
            line-height: 1.6;
            background-image: linear-gradient(to bottom, rgba(245, 247, 250, 0.9), rgba(245, 247, 250, 0.9)), 
                            url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M30,10 L70,10 L90,30 L90,70 L70,90 L30,90 L10,70 L10,30 Z" fill="none" stroke="%23e1e5ee" stroke-width="1"/></svg>');
            background-size: 100px 100px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        
        .header::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 3px;
        }
        
        .btn-home {
            display: inline-flex;
            align-items: center;
            padding: 8px 15px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        
        .btn-home:hover {
            background-color: #0d5bba;
            transform: translateY(-2px);
        }
        
        .btn-home i {
            margin-right: 8px;
        }
        
        h1 {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }
        
        h1::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 50%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), transparent);
            border-radius: 2px;
        }
        
        .card {
            background-color: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 30px;
            margin-bottom: 30px;
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }
        
        .card:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-5px);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--dark-color);
            font-size: 1.1em;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1em;
            transition: var(--transition);
        }
        
        input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 14px rgba(0, 0, 0, 0.15);
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .terminal-container {
            position: relative;
        }
        
        .terminal-header {
            background: linear-gradient(135deg, #333, #555);
            color: white;
            padding: 10px 15px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            align-items: center;
            font-size: 0.9em;
        }
        
        .terminal-header i {
            margin-right: 10px;
        }
        
        .terminal-buttons {
            display: flex;
            margin-left: auto;
        }
        
        .terminal-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 8px;
        }
        
        .terminal-btn.red {
            background-color: #ff5f56;
        }
        
        .terminal-btn.yellow {
            background-color: #ffbd2e;
        }
        
        .terminal-btn.green {
            background-color: #27c93f;
        }
        
        #server-terminal {
            height: 200px;
            background-color: #1e1e1e;
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            padding: 15px;
            overflow-y: auto;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        
        #server-terminal p {
            margin: 5px 0;
            position: relative;
            padding-left: 20px;
        }
        
        #server-terminal p::before {
            content: ">";
            position: absolute;
            left: 5px;
            color: var(--accent-color);
        }
        
        .logistics-icon {
            position: absolute;
            opacity: 0.1;
            z-index: -1;
        }
        
        .truck-icon {
            bottom: 20px;
            right: 20px;
            font-size: 100px;
            transform: rotate(15deg);
        }
        
        .package-icon {
            top: 100px;
            left: 30px;
            font-size: 80px;
            transform: rotate(-10deg);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .card {
                padding: 20px;
            }
            
            .btn {
                padding: 12px 25px;
            }
            
            .logistics-icon {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-tags"></i> Расчет машин</h1>
            <a href="{% url 'index_page' %}" class="btn-home">
                <i class="fas fa-home"></i> Главная
            </a>
        </div>
        
        <i class="fas fa-truck logistics-icon truck-icon"></i>
        <i class="fas fa-box-open logistics-icon package-icon"></i>
        
        <div class="card">
            <form method="post" action="{% url 'grafik_view' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="file_path">
                        <i class="fas fa-folder-open"></i> Путь к исходным файлам:
                    </label>
                    <input type="text" name="file_path" value="{{ request.user.profile.file_path_user }}\График" placeholder="Введите путь к файлам...">
                </div>
                
                <button type="submit" class="btn">
                    <i class="fas fa-play"></i> Запустить расчет
                </button>
            </form>
        </div>
        
        <div class="terminal-container">
            <div class="terminal-header">
                <i class="fas fa-terminal"></i> Лог выполнения
                <div class="terminal-buttons">
                    <div class="terminal-btn red"></div>
                    <div class="terminal-btn yellow"></div>
                    <div class="terminal-btn green"></div>
                </div>
            </div>
            <div id="server-terminal"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function addServerMessage(message) {
            const terminal = $('#server-terminal');
            terminal.append('<p>' + message + '</p>');
            terminal.scrollTop(terminal[0].scrollHeight);
            
            // Добавляем анимацию для нового сообщения
            terminal.find('p:last').hide().fadeIn(300);
        }
        
        // Анимация при загрузке страницы
        $(document).ready(function() {
            $('.card').hide().fadeIn(500);
            $('.terminal-container').hide().slideDown(600);
        });
    </script>
    {% if messages %}
<script>
    (function(){
        // Добавление сообщения в "терминал"
        function addServerMessage(message) {
            console.log("Добавляем сообщение:", message);
            const terminal = $('#server-terminal');
            const safeHtml = $('<div>').text(message).html(); // экранирование HTML
            terminal.append('<p>' + safeHtml + '</p>');
            terminal.scrollTop(terminal[0].scrollHeight);
            terminal.find('p:last').hide().fadeIn(300);
        }

        // Загружаем все сообщения
        {% for message in messages %}
            addServerMessage("{{ message|escapejs }}");
        {% endfor %}
    })();
</script>
{% endif %}
</body>
</html>
